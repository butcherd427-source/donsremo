<!DOCTYPE html>
<html>
<head>
<title>DON SUPREMO</title>

<link href="https://fonts.googleapis.com/css2?family=Creepster&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow-x:hidden;
}

header{
padding:30px;
text-align:center;
background:linear-gradient(90deg,#ff00ff,#00ffff,#ff0000);
animation: glow 3s infinite alternate;
}

header h1{
font-size:70px;
font-family:'UnifrakturCook',cursive;
color:white;
text-shadow:0 0 20px red;
}

header p{
font-size:22px;
color:#ddd;
}

@keyframes glow{
from{filter:brightness(1);}
to{filter:brightness(1.4);}
}

.login-box{
text-align:center;
margin:20px;
}

input{
padding:12px;
margin:5px;
border:none;
border-radius:10px;
width:80%;
max-width:300px;
}

button{
padding:12px 25px;
border:none;
border-radius:15px;
background:#ff00ff;
color:white;
font-weight:bold;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #ff00ff;
}

.sections{
display:grid;
grid-template-columns:1fr;
gap:20px;
padding:20px;
}

.card{
background:#111;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px cyan;
animation: float 3s infinite ease-in-out;
}

.card h2{
font-family:'Creepster',cursive;
font-size:40px;
color:#00ffff;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.upload{
margin-top:20px;
}

.preview img,
.preview video{
width:100%;
margin-top:10px;
border-radius:10px;
}

.skull{
position:fixed;
font-size:40px;
animation: fall 10s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
}
100%{
transform:translateY(120vh);
}
}
</style>
</head>

<body>

<div class="skull" style="left:10%;">💀</div>
<div class="skull" style="left:40%;animation-delay:2s;">🦇</div>
<div class="skull" style="left:70%;animation-delay:5s;">👻</div>

<header>
<h1>DON SUPREMO</h1>
<p>Dark Blogger • Gamer • Horror Creator</p>
</header>

<div class="login-box">
<h2>LOGIN</h2>

<input type="text" placeholder="Username"><br>
<input type="password" placeholder="Password"><br>

<button>ENTER</button>
</div>

<div class="sections">

<div class="card">
<h2>VIDEOS</h2>

<select id="type">
<option value="video">Video</option>
<option value="image">Image</option>
<option value="file">File</option>
</select>

<div class="upload">
<input type="file" id="upload">
</div>

<div class="preview" id="preview"></div>
</div>

<div class="card">
<h2>GAMES</h2>
<p>Upload APKs and horror games here.</p>
</div>

<div class="card">
<h2>BLOGS</h2>
<p>Dark stories and scary posts appear here.</p>
</div>

</div>

<script>
const upload=document.getElementById("upload");
const preview=document.getElementById("preview");
const type=document.getElementById("type");

upload.addEventListener("change",function(){

const file=this.files[0];

if(!file)return;

const url=URL.createObjectURL(file);

if(type.value==="image"){
preview.innerHTML=
`<img src="${url}">`;
}

else if(type.value==="video"){
preview.innerHTML=
`<video controls src="${url}"></video>`;
}

else{
preview.innerHTML=
`<p>📁 ${file.name}</p>`;
}

});
</script>

</body>
</html>
