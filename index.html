<!DOCTYPE html>
<html>
<head>

<title>DON SUPREMO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f0f0f;
color:white;
overflow-x:hidden;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(135deg,#111,#1a1a1a,#111);
}

header h1{
font-size:70px;
font-weight:700;
background:linear-gradient(90deg,#00ffff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation: glow 3s infinite alternate;
}

header p{
margin-top:15px;
font-size:20px;
color:#bbb;
letter-spacing:3px;
}

@keyframes glow{
from{
filter:brightness(1);
}
to{
filter:brightness(1.4);
}
}

.enter-btn{
margin-top:35px;
padding:16px 40px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#00ffff,#ff00ff);
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.enter-btn:hover{
transform:scale(1.05);
}

.topbar{
position:fixed;
top:0;
width:100%;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
z-index:100;
}

.logo{
font-size:24px;
font-weight:bold;
background:linear-gradient(90deg,#00ffff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.dashboard{
display:none;
padding:25px;
}

.section{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
padding:25px;
margin-bottom:30px;
backdrop-filter:blur(10px);
}

.section h2{
margin-bottom:20px;
font-size:30px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#1c1c1c;
color:white;
margin-bottom:15px;
font-size:16px;
}

.item{
background:#1c1c1c;
padding:15px;
border-radius:20px;
margin-top:15px;
animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

img,video{
width:100%;
border-radius:15px;
margin-top:10px;
}

.delete-btn{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:12px;
background:#ff0055;
color:white;
cursor:pointer;
}

.footer{
text-align:center;
padding:25px;
color:#888;
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">DON SUPREMO</div>
</div>

<header id="home">

<h1>DON SUPREMO</h1>

<p>BLOGGER • GAMER • CREATOR</p>

<button class="enter-btn" onclick="openSite()">
ENTER
</button>

</header>

<div class="dashboard" id="dashboard">

<div class="section">
<h2>Pictures</h2>

<input type="file" accept="image/*"
onchange="uploadFile(event,'pictures')">

<div id="pictures"></div>
</div>

<div class="section">
<h2>Videos</h2>

<input type="file" accept="video/*"
onchange="uploadFile(event,'videos')">

<div id="videos"></div>
</div>

<div class="section">
<h2>Games</h2>

<input type="file"
onchange="uploadFile(event,'games')">

<div id="games"></div>
</div>

<div class="section">
<h2>Files & Documents</h2>

<input type="file"
onchange="uploadFile(event,'files')">

<div id="files"></div>
</div>

</div>

<div class="footer">
DON SUPREMO © 2026
</div>

<script>

function openSite(){

const pass=prompt("ENTER ADMIN PASSWORD");

if(pass==="supremo123"){

document.getElementById("home").style.display="none";
document.getElementById("dashboard").style.display="block";

}

else{

alert("ACCESS DENIED");

}

}

function uploadFile(event,category){

const file=event.target.files[0];

if(!file)return;

const container=document.getElementById(category);

const item=document.createElement("div");

item.className="item";

if(file.type.startsWith("image/")){

const img=document.createElement("img");

img.src=URL.createObjectURL(file);

item.appendChild(img);

}

else if(file.type.startsWith("video/")){

const video=document.createElement("video");

video.src=URL.createObjectURL(file);

video.controls=true;

item.appendChild(video);

}

else{

item.innerHTML="<p>"+file.name+"</p>";

}

const del=document.createElement("button");

del.innerText="DELETE";

del.className="delete-btn";

del.onclick=function(){

item.remove();

};

item.appendChild(del);

container.appendChild(item);

}

</script>

</body>
</html>
