<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DON SUPREMO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:80px;
height:100%;
background:#111;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
z-index:1000;
border-right:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:28px;
font-weight:700;
background:linear-gradient(90deg,#00ffff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:40px;
}

.nav-btn{
width:55px;
height:55px;
margin:10px 0;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
background:#1a1a1a;
font-size:24px;
cursor:pointer;
transition:0.3s;
}

.nav-btn:hover{
background:linear-gradient(135deg,#00ffff,#ff00ff);
transform:scale(1.08);
}

.main{
margin-left:80px;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),
url('https://images.unsplash.com/photo-1511512578047-dfb367046420');
background-size:cover;
background-position:center;
}

.hero h1{
font-size:80px;
font-weight:700;
background:linear-gradient(90deg,#00ffff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:20px;
font-size:22px;
color:#bbb;
max-width:700px;
}

.hero button{
margin-top:35px;
padding:18px 45px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#00ffff,#ff00ff);
color:black;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:0.3s;
}

.hero button:hover{
transform:scale(1.05);
}

.section{
padding:50px 25px;
}

.section-title{
font-size:35px;
margin-bottom:25px;
font-weight:700;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:20px;
border-radius:25px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:#00ffff;
}

.upload-box{
border:2px dashed rgba(255,255,255,0.2);
padding:40px 20px;
border-radius:20px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.upload-box:hover{
border-color:#00ffff;
background:rgba(0,255,255,0.05);
}

.upload-box input{
display:none;
}

.preview img,
.preview video{
width:100%;
border-radius:15px;
margin-top:15px;
}

.preview-item{
background:#111;
padding:15px;
border-radius:20px;
margin-top:15px;
animation:fadeIn 0.5s ease;
}

.preview-item button{
margin-top:10px;
padding:10px 18px;
border:none;
border-radius:12px;
background:#ff0055;
color:white;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-top:25px;
}

.stat{
background:linear-gradient(135deg,#111,#1c1c1c);
padding:25px;
border-radius:20px;
text-align:center;
}

.stat h2{
font-size:40px;
background:linear-gradient(90deg,#00ffff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

footer{
padding:40px;
text-align:center;
color:#777;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:768px){

.hero h1{
font-size:50px;
}

.hero p{
font-size:18px;
}

.main{
margin-left:70px;
}

.sidebar{
width:70px;
}

}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">D</div>

<div class="nav-btn">🏠</div>
<div class="nav-btn">🖼️</div>
<div class="nav-btn">🎥</div>
<div class="nav-btn">🎮</div>
<div class="nav-btn">📁</div>

</div>

<div class="main">

<section class="hero">

<h1>DON SUPREMO</h1>

<p>
Premium creator platform for content, gaming, media and digital experiences.
</p>

<button onclick="openDashboard()">
ENTER PLATFORM
</button>

</section>

<section class="section">

<h2 class="section-title">Platform Stats</h2>

<div class="stats">

<div class="stat">
<h2>4</h2>
<p>Categories</p>
</div>

<div class="stat">
<h2>∞</h2>
<p>Creative Ideas</p>
</div>

<div class="stat">
<h2>24/7</h2>
<p>Online</p>
</div>

</div>

</section>

<section class="section" id="dashboard" style="display:none;">

<h2 class="section-title">Pictures</h2>

<div class="card">

<label class="upload-box">

Upload Images

<input type="file" accept="image/*"
onchange="uploadFile(event,'pictures')">

</label>

<div class="preview" id="pictures"></div>

</div>

</section>

<section class="section">

<h2 class="section-title">Videos</h2>

<div class="card">

<label class="upload-box">

Upload Videos

<input type="file" accept="video/*"
onchange="uploadFile(event,'videos')">

</label>

<div class="preview" id="videos"></div>

</div>

</section>

<section class="section">

<h2 class="section-title">Games</h2>

<div class="card">

<label class="upload-box">

Upload Games

<input type="file"
onchange="uploadFile(event,'games')">

</label>

<div class="preview" id="games"></div>

</div>

</section>

<section class="section">

<h2 class="section-title">Files & Documents</h2>

<div class="card">

<label class="upload-box">

Upload Files

<input type="file"
onchange="uploadFile(event,'files')">

</label>

<div class="preview" id="files"></div>

</div>

</section>

<footer>
DON SUPREMO © 2026
</footer>

</div>

<script>

function openDashboard(){

const pass=prompt("ENTER ADMIN PASSWORD");

if(pass==="supremo123"){

document.getElementById("dashboard").style.display="block";

window.scrollTo({
top:document.getElementById("dashboard").offsetTop,
behavior:"smooth"
});

}

else{

alert("ACCESS DENIED");

}

}

function uploadFile(event,category){

const file=event.target.files[0];

if(!file)return;

const container=document.getElementById(category);

const item=document.createElement("div");

item.className="preview-item";

if(file.type.startsWith("image/")){

const img=document.createElement("img");

img.src=URL.createObjectURL(file);

item.appendChild(img);

}

else if(file.type.startsWith("video/")){

const video=document.createElement("video");

video.src=URL.createObjectURL(file);

video.controls=true;

item.appendChild(video);

}

else{

item.innerHTML="<p>"+file.name+"</p>";

}

const del=document.createElement("button");

del.innerText="Delete";

del.onclick=function(){

item.remove();

};

item.appendChild(del);

container.appendChild(item);

}

</script>

</body>
</html>
