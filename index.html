<!DOCTYPE html>
<html>
<head>

<title>𝔇𝔬𝔫 𝔖𝔲𝔭𝔯𝔢𝔪𝔬</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:white;
font-family:'UnifrakturCook',cursive;
overflow-x:hidden;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),
url('https://images.unsplash.com/photo-1509248961158-e54f6934749c');
background-size:cover;
background-position:center;
}

header h1{
font-size:85px;
color:#ff0000;
text-shadow:
0 0 10px red,
0 0 20px red,
0 0 40px red;
animation: glow 2s infinite alternate;
}

header p{
font-size:30px;
color:#00ffff;
}

@keyframes glow{
from{
filter:brightness(1);
}
to{
filter:brightness(1.5);
}
}

.enter-btn{
padding:20px 40px;
font-size:25px;
border:none;
border-radius:20px;
background:#ff00ff;
color:white;
cursor:pointer;
box-shadow:0 0 25px #ff00ff;
font-family:'UnifrakturCook',cursive;
}

.dashboard{
display:none;
padding:20px;
}

.section{
background:#111;
padding:20px;
margin-bottom:30px;
border-radius:20px;
box-shadow:0 0 20px cyan;
}

.section h2{
font-size:45px;
color:#ff00ff;
}

input{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
background:#222;
color:white;
font-size:18px;
font-family:'UnifrakturCook',cursive;
}

.item{
background:#222;
padding:15px;
margin-top:15px;
border-radius:15px;
}

img,video{
width:100%;
border-radius:15px;
margin-top:10px;
}

.delete-btn{
margin-top:10px;
padding:10px 20px;
background:red;
border:none;
border-radius:10px;
color:white;
font-size:18px;
font-family:'UnifrakturCook',cursive;
}

.ghost{
position:fixed;
font-size:50px;
animation: float 5s infinite ease-in-out;
}

@keyframes float{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(-20px);
}
100%{
transform:translateY(0px);
}
}

.cobweb{
position:fixed;
font-size:90px;
top:0;
left:0;
}

</style>
</head>

<body>

<div class="cobweb">🕸️</div>

<div class="ghost" style="top:15%;left:10%;">👻</div>
<div class="ghost" style="top:40%;left:80%;">💀</div>
<div class="ghost" style="top:70%;left:50%;">🦇</div>

<header id="home">

<h1>𝔇𝔬𝔫 𝔖𝔲𝔭𝔯𝔢𝔪𝔬</h1>

<p>Dark Blogger • Horror Creator • Gamer</p>

<button class="enter-btn" onclick="openSite()">
ENTER DARKNESS
</button>

</header>

<div class="dashboard" id="dashboard">

<div class="section">

<h2>Pictures</h2>

<input type="file" accept="image/*"
onchange="uploadFile(event,'pictures')">

<div id="pictures"></div>

</div>

<div class="section">

<h2>Videos</h2>

<input type="file" accept="video/*"
onchange="uploadFile(event,'videos')">

<div id="videos"></div>

</div>

<div class="section">

<h2>Games</h2>

<input type="file"
onchange="uploadFile(event,'games')">

<div id="games"></div>

</div>

<div class="section">

<h2>Files and Documents</h2>

<input type="file"
onchange="uploadFile(event,'files')">

<div id="files"></div>

</div>

</div>

<script>

function openSite(){

const pass=prompt("ENTER ADMIN PASSWORD");

if(pass==="supremo123"){

document.getElementById("home").style.display="none";
document.getElementById("dashboard").style.display="block";

}

else{

alert("ACCESS DENIED");

}

}

function uploadFile(event,category){

const file=event.target.files[0];

if(!file)return;

const container=document.getElementById(category);

const item=document.createElement("div");

item.className="item";

if(file.type.startsWith("image/")){

const img=document.createElement("img");

img.src=URL.createObjectURL(file);

item.appendChild(img);

}

else if(file.type.startsWith("video/")){

const video=document.createElement("video");

video.src=URL.createObjectURL(file);

video.controls=true;

item.appendChild(video);

}

else{

item.innerHTML="<p>"+file.name+"</p>";

}

const del=document.createElement("button");

del.innerText="DELETE";

del.className="delete-btn";

del.onclick=function(){

item.remove();

};

item.appendChild(del);

container.appendChild(item);

}

</script>

</body>
</html>
